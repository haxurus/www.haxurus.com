name: Remove custom pointer effects

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-custom-pointer-effects.yml'

permissions:
  contents: write

jobs:
  clean-pointer-effects:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Remove custom pointer effects
        shell: python
        run: |
          from pathlib import Path
          import re

          loader = Path('scripts/script_loader.js')
          if loader.exists():
              text = loader.read_text(encoding='utf-8')
              text = re.sub(
                  r'\n?/\* reactive liquid glass \*/.*?(?=/\* hero glitch title \*/)',
                  '\n',
                  text,
                  flags=re.S,
              )
              loader.write_text(text, encoding='utf-8')

          extensions = {'.css', '.html', '.js'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or path.suffix.lower() not in extensions:
                  continue
              if '.git' in path.parts or path == loader:
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              original = text

              # Remove image-based cursors and hidden native cursors.
              text = re.sub(
                  r'cursor\s*:\s*url\([^;{}]+\)(?:\s*[-\w]+)?\s*;?',
                  '',
                  text,
                  flags=re.I,
              )
              text = re.sub(
                  r'cursor\s*:\s*none\s*;?',
                  'cursor: auto;',
                  text,
                  flags=re.I,
              )

              # Remove common custom-cursor elements and rules when present.
              text = re.sub(
                  r'<(?:div|span)[^>]+class=["\'][^"\']*(?:custom-cursor|cursor-dot|cursor-ring|cursor-follower|mouse-cursor)[^"\']*["\'][^>]*>\s*</(?:div|span)>',
                  '',
                  text,
                  flags=re.I,
              )
              text = re.sub(
                  r'[^{}]*(?:\.custom-cursor|\.cursor-dot|\.cursor-ring|\.cursor-follower|\.mouse-cursor)[^{}]*\{[^{}]*\}',
                  '',
                  text,
                  flags=re.I,
              )

              if text != original:
                  path.write_text(text, encoding='utf-8')

          # The workflow is temporary and removes itself in the same commit.
          workflow = Path('.github/workflows/remove-custom-pointer-effects.yml')
          if workflow.exists():
              workflow.unlink()

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No pointer effects found."
            exit 0
          fi
          git commit -m "Remove custom pointer effects"
          git push origin main
