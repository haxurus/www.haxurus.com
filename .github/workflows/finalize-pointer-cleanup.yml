name: Finalize pointer cleanup

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/finalize-pointer-cleanup.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Finalize pointer cleanup
        shell: python
        run: |
          from pathlib import Path

          loader = Path('scripts/script_loader.js')
          text = loader.read_text(encoding='utf-8')
          text = text.replace("const href = 'site-effects.css';", "const href = 'css/site-effects.css';")
          loader.write_text(text, encoding='utf-8')

          css = Path('css/site-effects.css')
          marker = '/* Native pointer normalization */'
          addition = r'''

/* Native pointer normalization */
html,
body,
body * {
  cursor: auto !important;
}

a,
button,
[role="button"],
input[type="button"],
input[type="submit"],
input[type="reset"],
label[for],
select,
summary {
  cursor: pointer !important;
}

input,
textarea,
[contenteditable="true"] {
  cursor: text !important;
}

.link-card,
.playlist-card,
.quick-link,
.site-nav,
.site-footer__inner {
  --liquid-x: 50% !important;
  --liquid-y: 50% !important;
  --liquid-tilt-x: 0deg !important;
  --liquid-tilt-y: 0deg !important;
}

.link-card,
.playlist-card,
.quick-link {
  transform: none !important;
  will-change: auto !important;
}

.custom-cursor,
.cursor-dot,
.cursor-ring,
.cursor-follower,
.mouse-cursor {
  display: none !important;
}
'''
          current = css.read_text(encoding='utf-8')
          if marker not in current:
              css.write_text(current.rstrip() + addition + '\n', encoding='utf-8')

          root_css = Path('site-effects.css')
          if root_css.exists():
              root_css.unlink()

          workflow = Path('.github/workflows/finalize-pointer-cleanup.yml')
          if workflow.exists():
              workflow.unlink()

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize pointer cleanup"
          git push origin main
