name: Optimize homepage effects

on:
  push:
    branches:
      - agent/optimize-homepage-effects

permissions:
  contents: write

jobs:
  optimize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/optimize-homepage-effects

      - name: Apply source optimizations
        shell: python
        run: |
          from pathlib import Path
          import re

          index_path = Path('index.html')
          script_path = Path('scripts/script.js')
          loader_path = Path('scripts/script_loader.js')

          index = index_path.read_text(encoding='utf-8')
          script = script_path.read_text(encoding='utf-8')
          loader = loader_path.read_text(encoding='utf-8')

          index, canvas_count = re.subn(
              r'\s*<canvas\s+aria-hidden="true"\s+id="particle-bg"></canvas>',
              '',
              index,
              count=1,
          )
          if canvas_count != 1:
              raise RuntimeError('Canvas particle-bg non trovato o duplicato')

          unified_video = r'''/* background video */
          (() => {
            const video = document.querySelector('.background-video');
            if (!video) return;

            video.loop = true;
            video.muted = true;
            video.playsInline = true;
            video.setAttribute('loop', '');
            video.setAttribute('muted', '');
            video.setAttribute('playsinline', '');
            video.setAttribute('webkit-playsinline', '');

            let retryTimer = null;

            function play() {
              if (document.hidden || !video.paused) return;
              const promise = video.play();
              if (promise && typeof promise.catch === 'function') {
                promise.catch(() => {});
              }
            }

            function scheduleRetry() {
              window.clearTimeout(retryTimer);
              retryTimer = window.setTimeout(play, 250);
            }

            function restart() {
              try { video.currentTime = 0; } catch (error) {}
              play();
            }

            video.addEventListener('loadeddata', play);
            video.addEventListener('canplay', play);
            video.addEventListener('ended', restart);
            video.addEventListener('stalled', scheduleRetry);
            video.addEventListener('waiting', scheduleRetry);
            video.addEventListener('pause', scheduleRetry);
            document.addEventListener('visibilitychange', () => {
              if (!document.hidden) play();
            });
            window.addEventListener('focus', play);
            window.addEventListener('pointerdown', play, { once: true });

            play();
          })();

          '''

          script, video_count = re.subn(
              r'/\* background video \*/.*?(?=/\* particles \*/)',
              unified_video,
              script,
              count=1,
              flags=re.S,
          )
          if video_count != 1:
              raise RuntimeError('Gestore video principale non trovato')

          script, particle_count = re.subn(
              r'/\* particles \*/.*?(?=/\* sequential reveal \*/)',
              '',
              script,
              count=1,
              flags=re.S,
          )
          if particle_count != 1:
              raise RuntimeError('Blocco particelle non trovato')

          script, cursor_count = re.subn(
              r'\n?/\* custom cyber cursor \*/.*\Z',
              '\n',
              script,
              count=1,
              flags=re.S,
          )
          if cursor_count != 1:
              raise RuntimeError('Blocco cursore personalizzato non trovato')

          loader, watchdog_count = re.subn(
              r'/\* background video loop watchdog \*/.*?(?=/\* combined effects stylesheet \*/)',
              '',
              loader,
              count=1,
              flags=re.S,
          )
          if watchdog_count != 1:
              raise RuntimeError('Watchdog video duplicato non trovato')

          index_path.write_text(index, encoding='utf-8')
          script_path.write_text(script, encoding='utf-8')
          loader_path.write_text(loader, encoding='utf-8')

      - name: Validate JavaScript syntax
        run: |
          node --check scripts/script.js
          node --check scripts/script_loader.js

      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/optimize-homepage.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/script.js scripts/script_loader.js .github/workflows/optimize-homepage.yml
          git commit -m "Optimize homepage effects"
          git push origin agent/optimize-homepage-effects
